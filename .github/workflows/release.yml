name: Release extension

# Tag a version to publish a prebuilt, load-unpacked-ready extension zip:
#   npm version patch -w @engram/extension   # bump, optional
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run package -w @engram/extension
      - name: Attach extension zip to the release
        uses: softprops/action-gh-release@v2
        with:
          files: packages/extension/*.zip
          body: |
            Unpacked browser extension (Claude + ChatGPT capture).

            Install: download the zip, unzip it, then in a Chromium browser go to
            `chrome://extensions` → enable Developer mode → **Load unpacked** →
            select the unzipped folder.
